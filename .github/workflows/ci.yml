# ─── CI: lint + build + quick race on every push/PR ───────────────
name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy -D warnings
        run: cargo clippy -- -D warnings

  build:
    name: Build & Quick Race
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release

      - name: 🔵 Quick Race (nano tier)
        run: |
          echo "## CI Quick Race — nano tier" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ./target/release/pi-race --tier nano --format markdown 2>/dev/null >> $GITHUB_STEP_SUMMARY

      - name: Validate JSON output
        run: |
          ./target/release/pi-race --tier nano --format json 2>/dev/null | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          assert data['tier'] == 'nano'
          assert len(data['algorithms']) == 4
          for algo in data['algorithms']:
              assert algo['best_digits'] >= 1, f'{algo[\"name\"]} produced 0 digits'
          print('JSON output: OK')
          print(f'  Algorithms: {[a[\"name\"] for a in data[\"algorithms\"]]}')
          print(f'  Best digits: {[a[\"best_digits\"] for a in data[\"algorithms\"]]}')
          "
