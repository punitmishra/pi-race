# ─── Release: cross-compile + benchmark + publish on vX.Y.Z tag ──
name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build binaries for all targets in parallel ──────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: pi-race
            archive: pi-race-linux-x86_64.tar.gz

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: pi-race
            archive: pi-race-linux-aarch64.tar.gz

          - target: x86_64-apple-darwin
            os: macos-latest
            binary: pi-race
            archive: pi-race-macos-x86_64.tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            binary: pi-race
            archive: pi-race-macos-arm64.tar.gz

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: pi-race.exe
            archive: pi-race-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-linker (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} .
          tar czf ${{ matrix.archive }} ${{ matrix.binary }} README.md
          sha256sum ${{ matrix.archive }} > ${{ matrix.archive }}.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" .
          Compress-Archive -Path ${{ matrix.binary }},README.md -DestinationPath ${{ matrix.archive }}
          Get-FileHash ${{ matrix.archive }} -Algorithm SHA256 | `
            ForEach-Object { "$($_.Hash.ToLower())  ${{ matrix.archive }}" } | `
            Out-File -Encoding ascii ${{ matrix.archive }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256
          retention-days: 1

  # ── Benchmark on Linux (canonical timing numbers) ───────────────
  benchmark:
    name: Benchmark Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}

      - run: cargo build --release

      - name: Run all tiers
        run: |
          mkdir -p benchmark
          for tier in nano micro standard deep; do
            ./target/release/pi-race --tier $tier --format markdown 2>/dev/null > benchmark/$tier.md
            ./target/release/pi-race --tier $tier --format json     2>/dev/null > benchmark/$tier.json
          done

      - name: Timing stability (10 runs at standard tier)
        run: |
          python3 << 'PYEOF'
          import subprocess, json, statistics, os

          times = []
          for _ in range(10):
              result = subprocess.run(
                  ['./target/release/pi-race', '--tier', 'standard', '--format', 'json'],
                  capture_output=True, text=True
              )
              data = json.loads(result.stdout)
              # Sum total time across all algo × iters
              total_us = sum(
                  run['elapsed_us']
                  for algo in data['algorithms']
                  for run in algo['runs']
              )
              times.append(total_us)

          mean_us   = statistics.mean(times)
          stdev_us  = statistics.stdev(times)
          min_us    = min(times)
          max_us    = max(times)

          report = f"""## ⏱ Timing Stability (standard tier, 10 runs)

| Metric | Value |
|--------|-------|
| Mean total time | `{mean_us/1000:.2f}ms` |
| Std deviation   | `{stdev_us/1000:.3f}ms` |
| Min             | `{min_us/1000:.2f}ms` |
| Max             | `{max_us/1000:.2f}ms` |
| CV (σ/μ)        | `{stdev_us/mean_us*100:.1f}%` |

*Note: Ramanujan converges in ~2 iterations; remaining time is loop overhead for slower algorithms.*
"""
          with open('benchmark/timing-stability.md', 'w') as f:
              f.write(report)
          print(report)
          PYEOF

      - name: Build full benchmark report
        run: |
          python3 << 'PYEOF'
          import json, os

          tag = os.environ.get('GITHUB_REF_NAME', 'unknown')
          sha = os.environ.get('GITHUB_SHA', 'unknown')[:7]
          repo = os.environ.get('GITHUB_REPOSITORY', '')

          lines = [
              f"# 🔵 pi-race {tag} — Benchmark Report",
              "",
              f"> **Tag:** `{tag}` &nbsp;|&nbsp; **Commit:** `{sha}` &nbsp;|&nbsp; **Platform:** Linux x86_64 (ubuntu-latest)",
              "",
          ]

          for tier in ['nano', 'micro', 'standard', 'deep']:
              with open(f'benchmark/{tier}.md') as f:
                  md = f.read()
              if tier == 'deep':
                  lines.append(md)
              else:
                  body = '\n'.join(md.split('\n')[1:]).lstrip('\n')
                  lines.append(f"<details>")
                  lines.append(f"<summary>📋 {tier} tier</summary>")
                  lines.append("")
                  lines.append(body)
                  lines.append("</details>")
                  lines.append("")

          with open('benchmark/timing-stability.md') as f:
              lines.append(f.read())

          with open('benchmark/BENCHMARK_REPORT.md', 'w') as f:
              f.write('\n'.join(lines) + '\n')

          print("BENCHMARK_REPORT.md written")
          PYEOF

      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: benchmark/
          retention-days: 1

  # ── Create GitHub Release ────────────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build, benchmark]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Build release notes
        run: |
          python3 << 'PYEOF'
          import os, json, glob

          tag   = os.environ.get('GITHUB_REF_NAME', 'v0.0.0')
          repo  = os.environ.get('GITHUB_REPOSITORY', 'owner/repo')

          # Get previous tag for changelog range
          prev_tag = os.popen('git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo ""').read().strip()
          if prev_tag:
              log_range = f'{prev_tag}..HEAD'
          else:
              log_range = 'HEAD'

          commits = os.popen(
              f'git log {log_range} --pretty=format:"- %s ([%h](https://github.com/{repo}/commit/%H))" 2>/dev/null'
          ).read().strip()

          # Load deep benchmark summary
          bench_files = glob.glob('artifacts/benchmark-report/*.json')
          deep_json = next((f for f in bench_files if 'deep' in f), None)
          perf_lines = ""
          if deep_json:
              with open(deep_json) as f:
                  data = json.load(f)
              sorted_algos = sorted(data['algorithms'], key=lambda a: -a['best_digits'])
              medals = ["🥇","🥈","🥉","4️⃣"]
              rows = []
              for i, algo in enumerate(sorted_algos):
                  last = algo['runs'][-1]
                  rows.append(
                      f"| {medals[i]} **{algo['name']}** | "
                      f"`{algo['best_digits']}` | "
                      f"`{algo['best_estimate']:.15f}` | "
                      f"`{float(last['error']):.2e}` | "
                      f"`{float(last['elapsed_us'])/1000:.2f}ms` |"
                  )
              perf_lines = (
                  "\n## 📊 Performance (deep tier, Linux x86_64)\n\n"
                  "| Rank | Algorithm | Digits | Estimate | Error | Time |\n"
                  "|------|-----------|--------|----------|-------|------|\n"
                  + "\n".join(rows)
              )

          notes = f"""## 🔵 The Race to π — {tag}

## ⬇️ Downloads

| Platform | Architecture | Archive |
|----------|-------------|---------|
| Linux | x86_64 | `pi-race-linux-x86_64.tar.gz` |
| Linux | aarch64 (ARM) | `pi-race-linux-aarch64.tar.gz` |
| macOS | Intel x86_64 | `pi-race-macos-x86_64.tar.gz` |
| macOS | Apple Silicon arm64 | `pi-race-macos-arm64.tar.gz` |
| Windows | x86_64 | `pi-race-windows-x86_64.zip` |

SHA-256 checksums included as `.sha256` files.
{perf_lines}

## 🔀 What's Changed

{commits if commits else '- Initial release'}

## 🚀 Usage

```bash
# Terminal output (default, standard tier)
./pi-race

# Multi-tier precision comparison
./pi-race --tier deep

# Machine-readable output
./pi-race --tier extreme --format json

# GitHub Markdown report
./pi-race --format markdown --tier standard
```

**Tiers:** `nano` (10K) · `micro` (100K) · `standard` (1M) · `deep` (10M) · `extreme` (50M)

---
> Full benchmark report attached as `BENCHMARK_REPORT.md`
"""
          with open('release-notes.md', 'w') as f:
              f.write(notes)
          print("release-notes.md written")
          PYEOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.ref_name }}

          # Collect all archives and checksums
          FILES=""
          for f in artifacts/binary-*/*.tar.gz artifacts/binary-*/*.zip artifacts/binary-*/*.sha256; do
            [ -f "$f" ] && FILES="$FILES $f"
          done

          # Attach benchmark report
          cp artifacts/benchmark-report/BENCHMARK_REPORT.md .
          FILES="$FILES BENCHMARK_REPORT.md"

          gh release create "$TAG" \
            --title "🔵 pi-race $TAG" \
            --notes-file release-notes.md \
            $FILES

      - name: Post summary
        run: |
          echo "## 🚀 Release ${{ github.ref_name }} published" >> $GITHUB_STEP_SUMMARY
          cat release-notes.md >> $GITHUB_STEP_SUMMARY
